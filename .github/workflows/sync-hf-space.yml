name: Sync Hugging Face Space

on:
  workflow_dispatch:
    inputs:
      hf_space_name:
        description: Optional override for the Hugging Face Space name.
        required: false
        type: string
      hf_space_namespace:
        description: Optional override for the Hugging Face namespace or org.
        required: false
        type: string
      create_if_missing:
        description: Create the Hugging Face Space automatically if it does not exist.
        required: false
        type: boolean
        default: true
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_sync: ${{ steps.flags.outputs.should_sync }}
      has_hf_token: ${{ steps.flags.outputs.has_hf_token }}
    steps:
      - name: Resolve sync prerequisites
        id: flags
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          HF_SPACE_AUTO_SYNC: ${{ vars.HF_SPACE_AUTO_SYNC }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          should_sync=false
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" || "$HF_SPACE_AUTO_SYNC" == "true" ]]; then
            should_sync=true
          fi

          has_hf_token=false
          if [[ -n "$HF_TOKEN" ]]; then
            has_hf_token=true
          fi

          {
            echo "should_sync=$should_sync"
            echo "has_hf_token=$has_hf_token"
          } >> "$GITHUB_OUTPUT"

  missing-hf-token:
    needs: precheck
    if: needs.precheck.outputs.should_sync == 'true' && needs.precheck.outputs.has_hf_token != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped Space sync
        run: |
          echo "::warning::HF_TOKEN is not configured for GitHub Actions; skipping Hugging Face Space sync."

  preflight:
    needs: precheck
    if: needs.precheck.outputs.should_sync == 'true' && needs.precheck.outputs.has_hf_token == 'true'
    runs-on: ubuntu-latest
    outputs:
      repo_id: ${{ steps.resolve.outputs.repo_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Hugging Face Hub CLI support
        run: python -m pip install "huggingface_hub[cli]==0.30.2"
      - name: Log in to the Hugging Face CLI
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: hf auth login --token "$HF_TOKEN" --add-to-git-credential
      - name: Resolve Space configuration
        id: resolve
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          HF_CLI_BIN: ${{ vars.HF_CLI_BIN || 'hf' }}
          HF_SPACE_NAME: ${{ github.event.inputs.hf_space_name || vars.HF_SPACE_NAME }}
          HF_SPACE_NAMESPACE: ${{ github.event.inputs.hf_space_namespace || vars.HF_SPACE_NAMESPACE }}
          HF_SPACE_SDK: ${{ vars.HF_SPACE_SDK || 'gradio' }}
        run: python scripts/resolve_hf_space_config.py
      - name: Verify Hugging Face token and ensure Space exists
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          HF_CLI_BIN: ${{ vars.HF_CLI_BIN || 'hf' }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_CREATE_IF_MISSING: ${{ github.event.inputs.create_if_missing || 'true' }}
          HF_SPACE_NAME: ${{ github.event.inputs.hf_space_name || vars.HF_SPACE_NAME }}
          HF_SPACE_NAMESPACE: ${{ github.event.inputs.hf_space_namespace || vars.HF_SPACE_NAMESPACE }}
          HF_SPACE_REPO_ID: ${{ steps.resolve.outputs.repo_id }}
          HF_SPACE_SDK: ${{ steps.resolve.outputs.space_sdk }}
        run: python scripts/ensure_hf_space.py

  sync:
    needs: preflight
    if: needs.preflight.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Hugging Face Hub CLI support
        run: python -m pip install "huggingface_hub[cli]==0.30.2"
      - name: Log in to the Hugging Face CLI
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: hf auth login --token "$HF_TOKEN" --add-to-git-credential
      - name: Push repository directly to Hugging Face Space git remote
        env:
          HF_SPACE_REMOTE_BRANCH: main
          HF_SPACE_REPO_ID: ${{ needs.preflight.outputs.repo_id }}
        run: |
          git lfs install --local
          git remote add space "https://huggingface.co/spaces/${HF_SPACE_REPO_ID}" || git remote set-url space "https://huggingface.co/spaces/${HF_SPACE_REPO_ID}"
          git push space HEAD:${HF_SPACE_REMOTE_BRANCH}
