name: Python CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install lint tooling
        run: python -m pip install ruff==0.11.13
      - name: Run Ruff
        run: ruff check gradio_app.py demo.py scripts tests

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install smoke test tooling
        run: python -m pip install "pytest>=8.3,<9"
      - name: Install editable package metadata
        run: python -m pip install -e . --no-deps
      - name: Run package discovery tests
        run: python -m pytest tests/test_package_discovery.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install build tooling
        run: python -m pip install -r requirements/build.txt
      - name: Build distribution artifacts
        run: python -m build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
